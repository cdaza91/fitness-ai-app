version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fitcheck-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+psycopg2://fitcheck:fitcheck@db:5432/fitcheck
      - REDIS_URL=redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis

  db:
    image: postgres:16-alpine
    container_name: fitcheck-db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=fitcheck
      - POSTGRES_PASSWORD=fitcheck
      - POSTGRES_DB=fitcheck
    ports:
      - "5432:5432"
    volumes:
      - fitcheck_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: fitcheck-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  fitcheck_postgres_data:
